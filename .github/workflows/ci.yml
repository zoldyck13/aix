name: C++ CI (Build & Test Check)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libcli11-dev cmake build-essential clang-format

    - name: Install curlpp (if available via apt)
      run: |
        sudo apt-get install -y libcurlpp-dev || echo "curlpp not found in apt, building from source might be needed"

    - name: Run Clang-Format Inspection
      run: |
        find src/ tests/ -iname '*.hpp' -o -iname '*.cpp' | xargs clang-format --dry-run --Werror
    
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build build --config Release

    - name: Run Build Verification Test
      run: |
        cd build
        ctest --output-on-failure
