name: C++ CI (Build & Test Check)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libcli11-dev cmake build-essential catch2 nlohmann-json3-dev 

    - name: Install curlpp (if available via apt)
      run: |
        sudo apt-get install -y libcurlpp-dev || echo "curlpp not found in apt, building from source might be needed"

    - name : Install glow 
      run: |
        sudo mkdir -p /etc/apt/keyrings
        curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
        echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list
        sudo apt update
        sudo apt install glow

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build build --config Release

    - name: Run Build Verification Test
      run: |
        cd build
        ctest --output-on-failure

    - name: Check Code Formatting
      run: |
        find src/ tests/ -iname '*.hpp' -o -iname '*.cpp' | xargs clang-format --dry-run --Werror
