name: "Gemini AI Code Review"

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Gemini Code Review
        uses: sshnaidm/gemini-code-review-action@v2
        with:
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          model: "gemini-2.5-flash" 
          prompt: |
            Please review the code changes in this Pull Request.
            Identify any potential bugs, security vulnerabilities, or performance issues.
            Provide your feedback and suggestions clearly.
